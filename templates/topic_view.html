{% extends 'base.html' %}

{% block content %}

<style>
    /* Main Layout Box */
    .alpha-wrapper {
        font-family: 'Outfit', sans-serif;
        background-color: #E2E8F0;
        background-image: radial-gradient(#94A3B8 2px, transparent 2px);
        background-size: 30px 30px;
        padding: 40px 20px;
        border-radius: 30px;
        border: 5px solid #000;
        box-shadow: 12px 12px 0px #000;
    }

    /* Breadcrumb Customization */
    .alpha-breadcrumb-container {
        background-color: #fff;
        border: 4px solid #000;
        border-radius: 15px;
        padding: 10px 20px;
        box-shadow: 6px 6px 0px #00FFCC;
        /* Cyan Shadow */
        margin-bottom: 30px;
        display: inline-block;
    }

    .alpha-breadcrumb {
        margin-bottom: 0;
        font-weight: 700;
        font-size: 1.1rem;
    }

    .alpha-breadcrumb a {
        color: #7000FF;
        /* Electric Purple */
        text-decoration: none;
        text-transform: uppercase;
        transition: color 0.2s;
    }

    .alpha-breadcrumb a:hover {
        color: #FF3366;
        /* Hot pink hover */
    }

    .alpha-breadcrumb .active {
        color: #000;
        font-weight: 900;
        text-transform: uppercase;
    }

    /* Page Header Styling */
    .alpha-topic-title {
        font-weight: 900;
        color: #fff;
        font-size: 3.5rem;
        text-transform: uppercase;
        -webkit-text-stroke: 2px #000;
        text-shadow: 6px 6px 0px #7000FF;
        letter-spacing: 2px;
        margin-bottom: 2.5rem;
    }

    .alpha-topic-title span {
        color: #FFD700;
        /* Bright Yellow for the dynamic domain name */
    }

    /* Card Styling */
    .alpha-subtopic-card {
        height: 100%;
        background-color: #fff;
        border: 5px solid #000 !important;
        border-radius: 20px !important;
        box-shadow: 8px 8px 0px #FF3366 !important;
        /* Hot Pink Shadow */
        transition: all 0.2s ease;
    }

    /* Mouse Hover Effect (Bouncy) */
    .alpha-subtopic-card:hover {
        transform: translate(-4px, -4px);
        box-shadow: 12px 12px 0px #FF3366 !important;
        background-color: #f8f9fa !important;
    }

    .card-inner-content {
        padding: 2.5rem 1.5rem;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .alpha-subtopic-title {
        font-size: 1.8rem;
        font-weight: 900;
        color: #000;
        margin-bottom: 1.5rem;
        text-transform: uppercase;
    }

    /* Custom Green Button */
    .alpha-success-btn {
        background-color: #00FFCC;
        /* Neon Cyan */
        color: #000 !important;
        font-weight: 900;
        font-size: 1.2rem;
        border: 4px solid #000;
        border-radius: 15px;
        padding: 10px 25px;
        box-shadow: 5px 5px 0px #000;
        text-transform: uppercase;
        text-decoration: none;
        display: inline-block;
        transition: all 0.1s ease;
    }

    .alpha-success-btn:hover {
        background-color: #00E6B8;
        transform: translate(-3px, -3px);
        box-shadow: 8px 8px 0px #000;
    }

    .alpha-success-btn:active {
        transform: translate(3px, 3px);
        box-shadow: 0px 0px 0px #000;
    }

    /* Empty Alert Styling */
    .alpha-alert {
        background-color: #FFD700;
        /* Bright Yellow */
        border: 5px solid #000;
        color: #000;
        font-weight: 900;
        font-size: 1.4rem;
        border-radius: 20px;
        box-shadow: 8px 8px 0px #000;
        padding: 30px;
        text-transform: uppercase;
        text-align: center;
    }
</style>

<div class="container mt-5 mb-5 alpha-wrapper">

    <nav aria-label="breadcrumb" class="alpha-breadcrumb-container mt-2">
        <ol class="breadcrumb alpha-breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('index') }}">🏠 Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ domain_name }}</li>
        </ol>
    </nav>

    <div class="text-center">
        <h2 class="alpha-topic-title">Subtopics in <br><span>{{ domain_name }}</span></h2>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-4 mb-4">
        {% if subtopics %}
        {% for tabcat in subtopics %}
        <div class="col">
            <div class="card alpha-subtopic-card">
                <div class="card-inner-content">
                    <h4 class="alpha-subtopic-title">{{ tabcat }}</h4>
                    <a href="{{ url_for('view_subtopic', domain_name=domain_name, tabcat_name=tabcat) }}"
                        class="alpha-success-btn">
                        View Lessons
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
        {% else %}
        <div class="col-12">
            <div class="alpha-alert">⚠️ No subtopics found for this domain. ⚠️</div>
        </div>
        {% endif %}
    </div>

</div>

{% endblock %}
